services:
  - type: web
    name: shopgenius
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: shopgenius-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"

databases:
  - name: shopgenius-db
    plan: free
    databaseName: shopgenius
